name: Lint & Format & Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-build-test:
    name: ESLint & Prettier & Build test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier
        run: npx prettier --check .

      - name: Build
        run: npm run build
